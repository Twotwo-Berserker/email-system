# ============================================================
# Nginx 生产环境配置文件
# 用途: 前端静态资源 + 后端 API 代理 + MinIO 控制台代理
# 位置: deploy/nginx/default.conf
# ============================================================

upstream backend {
    server backend:8080;
}

upstream minio-console {
    server minio:9001;
}

# 【生产环境替换项】根据实际域名替换 server_name
server {
    listen 80;
    server_name localhost;

    # -------------------- 文件上传大小限制 --------------------
    # 必须与后端 application.yml 中的 file.upload.max-size 保持一致
    # 同时要大于 MinIO 存储桶的对象大小限制
    client_max_body_size 100m;
    client_body_timeout 120s;

    # -------------------- Gzip 压缩 --------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               image/svg+xml;

    # -------------------- 前端静态资源 --------------------
    # 静态文件来自 frontend-dist 命名卷（由 frontend 服务构建）
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # -------------------- 后端 API 代理 --------------------
    location /api/ {
        # 去掉 /api 前缀后转发到后端
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（附件上传/下载可能较慢）
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # -------------------- MinIO 控制台代理（可选） --------------------
    # 如不需要外部访问 MinIO 控制台，可注释此段
    # 【生产环境替换项】生产环境建议移除或添加 IP 白名单限制
    location /minio-console/ {
        proxy_pass http://minio-console;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
