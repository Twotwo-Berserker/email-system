# ============================================================
# Redis 生产环境配置文件
# 适配 Docker 部署，覆盖安全、持久化、内存、连接等关键配置
# ============================================================

# -------------------- 网络与连接 --------------------
# 绑定地址（Docker 内部默认监听所有接口，生产环境通过防火墙限制）
bind 0.0.0.0

# 端口
port 6379

# 连接超时时间（秒），0 表示不超时
timeout 300

# TCP 保活（秒），建议 60-300
tcp-keepalive 60

# 最大客户端连接数
# 【生产环境替换项】根据实际并发量调整，默认 10000
maxclients 10000

# -------------------- 安全 --------------------
# 密码认证（密码通过环境变量 REDIS_PASSWORD 传入，此处用占位符）
# 实际运行时由 docker-compose 的 command 注入 requirepass
# 此配置项在 docker-compose 中通过启动参数覆盖

# 禁止危险命令（生产环境建议禁用）
# 可根据需要取消注释:
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command KEYS ""
# rename-command CONFIG "CONFIG_b9fc8325"

# -------------------- 持久化 (RDB + AOF 双写) --------------------
# RDB 快照策略
# 900秒内至少1个key变化 → 触发 RDB
save 900 1
# 300秒内至少10个key变化 → 触发 RDB
save 300 10
# 60秒内至少10000个key变化 → 触发 RDB
save 60 10000

# RDB 文件写入失败时拒绝写入请求
stop-writes-on-bgsave-error yes

# RDB 文件压缩（CPU 换磁盘空间）
rdbcompression yes

# RDB 文件校验
rdbchecksum yes

# RDB 文件名
dbfilename dump.rdb

# 持久化数据目录（挂载到宿主机）
dir /data

# 开启 AOF（追加文件持久化）
appendonly yes

# AOF 文件名
appendfilename "appendonly.aof"

# AOF 同步策略：everysec = 每秒同步一次（性能与安全的平衡）
# always = 每次写入都同步（最安全，性能最差）
# no     = 由操作系统决定（不安全）
appendfsync everysec

# AOF 自动重写触发条件
# 当 AOF 文件大小增长到上次重写后的指定百分比时触发
auto-aof-rewrite-percentage 100
# 当 AOF 文件大小超过指定值时触发重写
auto-aof-rewrite-min-size 64mb

# -------------------- 内存管理 --------------------
# 最大内存限制
# 【生产环境替换项】根据服务器内存调整，建议为服务器内存的 50%-70%
maxmemory 256mb

# 内存淘汰策略：allkeys-lru = 移除最近最少使用的key（适合缓存场景）
# 其他常用策略:
#   volatile-lru    = 仅在设置了过期时间的key中淘汰
#   allkeys-random  = 随机淘汰
#   volatile-ttl    = 淘汰即将过期的key
#   noeviction      = 不淘汰，内存满时拒绝写入（不推荐用于缓存）
maxmemory-policy allkeys-lru

# 内存淘汰样本数（越大越精确，但更耗CPU）
maxmemory-samples 5

# -------------------- 慢查询日志 --------------------
# 慢查询阈值（微秒），超过此值的查询将被记录
slowlog-log-slower-than 10000

# 慢查询日志最大长度
slowlog-max-len 128

# -------------------- 通用配置 --------------------
# 数据库数量
databases 16

# 是否以守护进程运行（Docker 中必须为 no）
daemonize no

# 是否显示 Redis Logo
always-show-logo no

# 日志级别: debug / verbose / notice / warning
loglevel notice

# 日志文件路径（Docker 中输出到 stdout）
logfile ""
