server:
  port: 8080

spring:
  application:
    name: mail-system-backend

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:mail_system}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 配置（缓存、验证码、Token黑名单）
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 16       # 连接池最大连接数
        max-idle: 8          # 连接池最大空闲连接数
        min-idle: 2          # 连接池最小空闲连接数
        max-wait: 3000ms     # 连接池获取连接最大等待时间

  servlet:
    multipart:
      enabled: true
      max-file-size: ${FILE_UPLOAD_MAX_SIZE:52428800}    # 单文件最大 50MB
      max-request-size: ${FILE_REQUEST_MAX_SIZE:104857600}  # 请求最大 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mailsystem.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  # 【生产环境替换项】生产环境使用随机生成的密钥，长度至少 256 位
  secret: ${JWT_SECRET:mail-system-2026-secret-key-for-jwt-token-generation}
  expiration: ${JWT_EXPIRATION:86400000}  # 24小时，单位毫秒

# 文件存储配置（本地磁盘模式，MinIO 模式下仅作为临时缓存）
file:
  upload:
    path: ./uploads/attachments/
    max-size: ${FILE_UPLOAD_MAX_SIZE:52428800}  # 50MB

# MinIO 对象存储配置（大附件）
minio:
  # 【生产环境替换项】生产环境 MinIO 地址
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  # 存储桶名称（由 deploy/minio/init.sh 创建）
  bucket-name: ${MINIO_BUCKET_NAME:mail-attachments}

---
# ============================================================
# Docker 环境 Profile
# 激活方式: SPRING_PROFILES_ACTIVE=docker
# ============================================================
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:mail_system}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true

  redis:
    host: redis
    password: ${REDIS_PASSWORD:redis_secure_password_2026}

minio:
  endpoint: http://minio:9000

# Docker 环境下关闭 MyBatis SQL 日志（减少日志量）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
